<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>1-1 Meeting Tracker Dashboard</title>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 { color: #333; }

    /* DASHBOARD */
    .dashboard {
      display: flex;
      gap: 15px;
      margin: 20px 0;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 15px 20px;
      border-radius: 12px;
      min-width: 120px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .card h2 { margin: 0; }

    /* INPUT */
    .input-group, .search-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 420px;
      margin-bottom: 15px;
    }

    input, textarea {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    textarea { min-height: 80px; }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
    }

    .add-btn { background: #4CAF50; }

    /* ENTRY */
    #entries {
      width: 100%;
      max-width: 650px;
    }

    .entry {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .completed {
      text-decoration: line-through;
      color: gray;
    }

    .entry-controls {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .btn-blue { background: #2196F3; }
    .btn-red { background: #f44336; }
    .btn-orange { background: #ff9800; }

    #no-entries {
      color: gray;
      margin-top: 20px;
      font-style: italic;
    }
  </style>
</head>

<body>

  <h1>1-1 Meeting Tracker</h1>

  <!-- DASHBOARD -->
  <div class="dashboard">
    <div class="card"><h2 id="total">0</h2><p>Total</p></div>
    <div class="card"><h2 id="completed">0</h2><p>Completed</p></div>
    <div class="card"><h2 id="pending">0</h2><p>Pending</p></div>
  </div>

  <!-- SEARCH -->
  <div class="search-group">
    <input id="searchInput" placeholder="Search employee..." oninput="render()">
  </div>

  <!-- INPUT -->
  <div class="input-group">
    <input id="name" placeholder="Employee name">
    <input id="date" type="date">
    <textarea id="notes" placeholder="Meeting notes"></textarea>
    <textarea id="actions" placeholder="Action items"></textarea>
    <button class="add-btn" onclick="save()">Save Entry</button>
  </div>

  <!-- LIST -->
  <div id="entries"></div>
  <div id="no-entries">No entries yet</div>

<script>
  let entries = JSON.parse(localStorage.getItem("entries")) || [];
  let editId = null;

  function persist() {
    localStorage.setItem("entries", JSON.stringify(entries));
  }

  // ================= SAVE / UPDATE =================
  function save() {
    const name = document.getElementById("name").value.trim();
    const date = document.getElementById("date").value;
    const notes = document.getElementById("notes").value.trim();
    const actions = document.getElementById("actions").value.trim();

    if (!name || !notes) {
      alert("Name and notes required");
      return;
    }

    if (editId !== null) {
      // UPDATE existing
      const entry = entries.find(e => e.id === editId);
      entry.name = name;
      entry.date = date;
      entry.notes = notes;
      entry.actions = actions;
      editId = null;
    } else {
      // NEW entry
      entries.push({
        id: Date.now(),
        name,
        date,
        notes,
        actions,
        completed: false
      });
    }

    clearForm();
    persist();
    render();
  }

  function clearForm() {
    document.getElementById("name").value = "";
    document.getElementById("date").value = "";
    document.getElementById("notes").value = "";
    document.getElementById("actions").value = "";
  }

  // ================= EDIT =================
  function editEntry(id) {
    const entry = entries.find(e => e.id === id);

    document.getElementById("name").value = entry.name;
    document.getElementById("date").value = entry.date;
    document.getElementById("notes").value = entry.notes;
    document.getElementById("actions").value = entry.actions;

    editId = id;
  }

  // ================= DELETE =================
  function deleteEntry(id) {
    entries = entries.filter(e => e.id !== id);
    persist();
    render();
  }

  // ================= DASHBOARD =================
  function updateDashboard() {
    document.getElementById("total").innerText = entries.length;
    document.getElementById("completed").innerText =
      entries.filter(e => e.completed).length;
    document.getElementById("pending").innerText =
      entries.filter(e => !e.completed).length;
  }

  // ================= RENDER =================
  function render() {
    const container = document.getElementById("entries");
    const search = document.getElementById("searchInput").value.toLowerCase();

    container.innerHTML = "";

    const filtered = entries.filter(e =>
      e.name.toLowerCase().includes(search)
    );

    document.getElementById("no-entries").style.display =
      filtered.length ? "none" : "block";

    filtered.forEach(entry => {
      const div = document.createElement("div");
      div.className = "entry";

      const title = document.createElement("h3");
      title.innerText = `${entry.name} (${entry.date || "No date"})`;

      const notes = document.createElement("p");
      notes.innerText = entry.notes;
      if (entry.completed) notes.classList.add("completed");

      const actions = document.createElement("p");
      actions.innerText = entry.actions || "";
      if (entry.completed) actions.classList.add("completed");

      const controls = document.createElement("div");
      controls.className = "entry-controls";

      // COMPLETE
      const completeBtn = document.createElement("button");
      completeBtn.innerText = entry.completed ? "Undo" : "Complete";
      completeBtn.className = "btn-orange";
      completeBtn.onclick = () => {
        entry.completed = !entry.completed;
        persist();
        render();
      };

      // EDIT (RESTORED ✔)
      const editBtn = document.createElement("button");
      editBtn.innerText = "Edit";
      editBtn.className = "btn-blue";
      editBtn.onclick = () => editEntry(entry.id);

      // DELETE
      const deleteBtn = document.createElement("button");
      deleteBtn.innerText = "Delete";
      deleteBtn.className = "btn-red";
      deleteBtn.onclick = () => deleteEntry(entry.id);

      controls.appendChild(completeBtn);
      controls.appendChild(editBtn);
      controls.appendChild(deleteBtn);

      div.appendChild(title);
      div.appendChild(notes);
      div.appendChild(actions);
      div.appendChild(controls);

      container.appendChild(div);
    });

    updateDashboard();
  }

  render();
</script>

</body>
</html>
